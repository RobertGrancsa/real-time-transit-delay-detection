version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Apache Kafka — KRaft mode (no Zookeeper), single-node for local dev
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:4.0.2
    container_name: transit-kafka
    hostname: kafka
    ports:
      - "0.0.0.0:9094:9094"
    environment:
      # KRaft combined broker + controller on a single node
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners — INTERNAL for Docker containers, EXTERNAL for host/LAN, CONTROLLER for raft.
      # EXTERNAL is advertised as ${KAFKA_EXTERNAL_HOST:-localhost} so clients on other
      # machines can resolve and reach the broker. Set KAFKA_EXTERNAL_HOST to the host's
      # LAN IP in .env to expose Kafka to remote clients.
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Topic defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3

      # Log retention — keep 24h for dev
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - transit-net
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # TimescaleDB — PostgreSQL 16 with the TimescaleDB extension
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: transit-timescaledb
    hostname: timescaledb
    ports:
      - "0.0.0.0:5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transit}
      POSTGRES_USER: ${POSTGRES_USER:-transit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transit_secret}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    networks:
      - transit-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transit} -d ${POSTGRES_DB:-transit}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Apache Flink — JobManager (coordinates jobs, hosts web UI on :8081)
  # ---------------------------------------------------------------------------
  flink-jobmanager:
    build:
      context: .
      dockerfile: flink/Dockerfile
    image: transit-flink-pyflink:1.20.3
    container_name: transit-flink-jobmanager
    hostname: flink-jobmanager
    ports:
      - "0.0.0.0:8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        jobmanager.memory.process.size: 1024m
        state.backend: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints
      # Forwarded to PyFlink jobs via env vars
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_LIVE_TELEMETRY: transit-live-telemetry
      ANALYTICS_WATERMARK_LAG_SECONDS: ${ANALYTICS_WATERMARK_LAG_SECONDS:-15}
      ANALYTICS_BUNCHING_THRESHOLD_SECONDS: ${ANALYTICS_BUNCHING_THRESHOLD_SECONDS:-120}
      ANALYTICS_SERVICE_GAP_THRESHOLD_MINUTES: ${ANALYTICS_SERVICE_GAP_THRESHOLD_MINUTES:-10}
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-transit}
      POSTGRES_USER: ${POSTGRES_USER:-transit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transit_secret}
    volumes:
      - ./services/flink_jobs:/opt/flink/jobs:ro
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-savepoints:/opt/flink/savepoints
    networks:
      - transit-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8081/overview > /dev/null" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Apache Flink — TaskManager (executes tasks, 4 slots for parallelism)
  # ---------------------------------------------------------------------------
  flink-taskmanager:
    build:
      context: .
      dockerfile: flink/Dockerfile
    image: transit-flink-pyflink:1.20.3
    container_name: transit-flink-taskmanager
    hostname: flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2048m
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_LIVE_TELEMETRY: transit-live-telemetry
      ANALYTICS_WATERMARK_LAG_SECONDS: ${ANALYTICS_WATERMARK_LAG_SECONDS:-15}
      ANALYTICS_BUNCHING_THRESHOLD_SECONDS: ${ANALYTICS_BUNCHING_THRESHOLD_SECONDS:-120}
      ANALYTICS_SERVICE_GAP_THRESHOLD_MINUTES: ${ANALYTICS_SERVICE_GAP_THRESHOLD_MINUTES:-10}
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-transit}
      POSTGRES_USER: ${POSTGRES_USER:-transit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transit_secret}
    volumes:
      - ./services/flink_jobs:/opt/flink/jobs:ro
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    networks:
      - transit-net

  # ---------------------------------------------------------------------------
  # Live Producer - polls the public API and publishes Kafka telemetry
  # ---------------------------------------------------------------------------
  live-producer:
    build:
      context: .
      dockerfile: Dockerfile
    image: transit-python-services:0.1
    container_name: transit-live-producer
    command: python -m services.live_producer.producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_LIVE_TELEMETRY: ${KAFKA_TOPIC_LIVE_TELEMETRY:-transit-live-telemetry}
      LIVE_API_URL: ${LIVE_API_URL:-https://maps.mo-bi.ro/api/busData}
      LIVE_API_POLL_INTERVAL_SECONDS: ${LIVE_API_POLL_INTERVAL_SECONDS:-10}
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - transit-net

  # ---------------------------------------------------------------------------
  # GTFS Matcher - true schedule delay and ML feature generation
  # ---------------------------------------------------------------------------
  gtfs-matcher:
    build:
      context: .
      dockerfile: Dockerfile
    image: transit-python-services:0.1
    container_name: transit-gtfs-matcher
    command: python -m services.gtfs_matching.matcher
    environment:
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-transit}
      POSTGRES_USER: ${POSTGRES_USER:-transit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transit_secret}
      ANALYTICS_STOP_GEOFENCE_METERS: ${ANALYTICS_STOP_GEOFENCE_METERS:-75}
      ANALYTICS_FEATURE_WINDOW_MINUTES: ${ANALYTICS_FEATURE_WINDOW_MINUTES:-15}
      ANALYTICS_SCHEDULE_TIMEZONE: ${ANALYTICS_SCHEDULE_TIMEZONE:-Europe/Bucharest}
      ANALYTICS_GTFS_MATCH_INTERVAL_SECONDS: ${ANALYTICS_GTFS_MATCH_INTERVAL_SECONDS:-30}
      ANALYTICS_GTFS_MATCH_LOOKBACK_MINUTES: ${ANALYTICS_GTFS_MATCH_LOOKBACK_MINUTES:-120}
      ANALYTICS_GTFS_MATCH_BATCH_SIZE: ${ANALYTICS_GTFS_MATCH_BATCH_SIZE:-20}
      ANALYTICS_GTFS_MATCH_SCHEDULE_TOLERANCE_MINUTES: ${ANALYTICS_GTFS_MATCH_SCHEDULE_TOLERANCE_MINUTES:-90}
      PREDICTION_HIGH_DELAY_THRESHOLD_SECONDS: ${PREDICTION_HIGH_DELAY_THRESHOLD_SECONDS:-300}
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - transit-net

  # ---------------------------------------------------------------------------
  # Delay Predictor - route delay forecasts from realtime feature windows
  # ---------------------------------------------------------------------------
  delay-predictor:
    build:
      context: .
      dockerfile: Dockerfile
    image: transit-python-services:0.1
    container_name: transit-delay-predictor
    command: python -m services.predictor.predictor
    environment:
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-transit}
      POSTGRES_USER: ${POSTGRES_USER:-transit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transit_secret}
      ANALYTICS_FEATURE_WINDOW_MINUTES: ${ANALYTICS_FEATURE_WINDOW_MINUTES:-15}
      ANALYTICS_SCHEDULE_TIMEZONE: ${ANALYTICS_SCHEDULE_TIMEZONE:-Europe/Bucharest}
      PREDICTION_HORIZON_MINUTES: ${PREDICTION_HORIZON_MINUTES:-30}
      PREDICTION_HIGH_DELAY_THRESHOLD_SECONDS: ${PREDICTION_HIGH_DELAY_THRESHOLD_SECONDS:-300}
      PREDICTION_INTERVAL_SECONDS: ${PREDICTION_INTERVAL_SECONDS:-900}
      PREDICTION_MODEL_PATH: ${PREDICTION_MODEL_PATH:-models/delay_model.joblib}
      PREDICTION_MODEL_VERSION: ${PREDICTION_MODEL_VERSION:-local-dev}
    depends_on:
      timescaledb:
        condition: service_healthy
      gtfs-matcher:
        condition: service_started
    restart: unless-stopped
    networks:
      - transit-net

  # ---------------------------------------------------------------------------
  # Transit UI - map-based stop selector and GTFS trip planner
  # ---------------------------------------------------------------------------
  transit-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: transit-python-services:0.1
    container_name: transit-ui
    command: uvicorn services.trip_planner.app:app --host 0.0.0.0 --port 8000
    ports:
      - "0.0.0.0:${TRANSIT_UI_HOST_PORT:-8000}:8000"
    environment:
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-transit}
      POSTGRES_USER: ${POSTGRES_USER:-transit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transit_secret}
      ANALYTICS_SCHEDULE_TIMEZONE: ${ANALYTICS_SCHEDULE_TIMEZONE:-Europe/Bucharest}
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).read()\"" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - transit-net

  # ---------------------------------------------------------------------------
  # Grafana - Dashboards & visualization (auto-provisioned PostgreSQL source)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: transit-grafana
    hostname: grafana
    ports:
      - "0.0.0.0:${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_INSTALL_PLUGINS: grafana-worldmap-panel
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - transit-net

# ---------------------------------------------------------------------------
# Shared network & persistent volumes
# ---------------------------------------------------------------------------
networks:
  transit-net:
    driver: bridge

volumes:
  kafka-data:
  timescaledb-data:
  flink-checkpoints:
  flink-savepoints:
  grafana-data:
