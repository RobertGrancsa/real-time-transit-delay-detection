version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Apache Kafka — KRaft mode (no Zookeeper), single-node for local dev
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:4.0.2
    container_name: transit-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft combined broker + controller on a single node
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners — PLAINTEXT for clients, CONTROLLER for internal raft
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Topic defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3

      # Log retention — keep 24h for dev
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - transit-net
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # TimescaleDB — PostgreSQL 16 with the TimescaleDB extension
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: transit-timescaledb
    hostname: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transit}
      POSTGRES_USER: ${POSTGRES_USER:-transit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transit_secret}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    networks:
      - transit-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transit} -d ${POSTGRES_DB:-transit}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Apache Flink — JobManager (coordinates jobs, hosts web UI on :8081)
  # ---------------------------------------------------------------------------
  flink-jobmanager:
    image: apache/flink:1.20.3-java17
    container_name: transit-flink-jobmanager
    hostname: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        jobmanager.memory.process.size: 1024m
        state.backend: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints
    volumes:
      - ./flink/lib:/opt/flink/lib/custom:ro
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-savepoints:/opt/flink/savepoints
    networks:
      - transit-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8081/overview > /dev/null" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Apache Flink — TaskManager (executes tasks, 4 slots for parallelism)
  # ---------------------------------------------------------------------------
  flink-taskmanager:
    image: apache/flink:1.20.3-java17
    container_name: transit-flink-taskmanager
    hostname: flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2048m
    volumes:
      - ./flink/lib:/opt/flink/lib/custom:ro
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    networks:
      - transit-net

  # ---------------------------------------------------------------------------
  # Grafana — Dashboards & visualization (auto-provisioned PostgreSQL source)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: transit-grafana
    hostname: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-worldmap-panel
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - transit-net

# ---------------------------------------------------------------------------
# Shared network & persistent volumes
# ---------------------------------------------------------------------------
networks:
  transit-net:
    driver: bridge

volumes:
  kafka-data:
  timescaledb-data:
  flink-checkpoints:
  flink-savepoints:
  grafana-data:
